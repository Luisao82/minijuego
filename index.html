<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <title>La Cucaña Trianera</title>

    <!-- SEO básico -->
    <meta name="description" content="Minijuego que recrea una tradición muy popular de la Velá de Triana, La Cucaña. Coge impulso, mantén el equilibrio y alcanza la bandera." />
    <meta name="keywords" content="cucaña, triana, sevilla, minijuego, pixel art, velá de triana, juego retro" />
    <meta name="author" content="La Cucaña Trianera" />

    <!-- Open Graph — preview al compartir en WhatsApp, Twitter, Telegram... -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://minijuego-lilac.vercel.app/" />
    <meta property="og:title"       content="La Cucaña Trianera" />
    <meta property="og:description" content="Minijuego que recrea una tradición muy popular de la Velá de Triana, La Cucaña. Coge impulso, mantén el equilibrio y alcanza la bandera." />
    <meta property="og:image"       content="https://minijuego-lilac.vercel.app/assets/preview.webp" />
    <meta property="og:locale"      content="es_ES" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://minijuego-lilac.vercel.app/" />
    <meta name="twitter:title"       content="La Cucaña Trianera" />
    <meta name="twitter:description" content="Minijuego que recrea una tradición muy popular de la Velá de Triana, La Cucaña. Coge impulso, mantén el equilibrio y alcanza la bandera." />
    <meta name="twitter:image"       content="https://minijuego-lilac.vercel.app/assets/preview.webp" />

    <!-- Color de la barra del navegador en móvil -->
    <meta name="theme-color" content="#000000" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Cucaña" />
    <link rel="apple-touch-icon" href="/favicon.png" />
</head>

<body>
    <div id="app">
        <div id="game-container"></div>
    </div>
    <script type="module" src="src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
        })
      }
    </script>
</body>
</html>
